<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Super Admin • Inbox | LinkLedger</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="admin_messages.css" />
</head>

<body>
  <div class="container">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <h1>LinkLedger • Super Admin</h1>
      </div>

      <div class="legacy-badge" title="Legacy Mode">
        <span class="legacy-dot legacy-dot-pink"></span>
        <span class="legacy-lt">&lt;</span>
        <span class="legacy-dot legacy-dot-blue"></span>
        <span class="legacy-text">Legacy Mode</span>
      </div>

      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <span class="pill" id="adminPill">Logged in</span>

        <a class="btn-ghost" href="welcome.html">Home</a>
        <button class="btn-ghost" type="button" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- NAV -->
    <div id="adminNav" style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn-ghost btn-sm" href="admin_accounts.html">Accounts</a>
      <a class="btn-ghost btn-sm" href="admin_disputes.html">Disputes</a>
      <a class="btn-ghost btn-sm" href="admin_consents.html">Consents</a>
      <a class="btn-ghost btn-sm" href="admin_audit.html">Audit</a>
    </div>

    <!-- MAIN -->
    <section class="admin-inbox-shell">

      <!-- LEFT: CONVERSATIONS -->
      <aside class="inbox-sidebar">

        <div class="inbox-side-head">
          <h2>Inbox</h2>
          <button class="btn-ghost btn-sm" id="refreshInboxBtn" type="button">Refresh</button>
        </div>

        <div class="inbox-search-wrap">
          <input id="conversationSearch" placeholder="Search institution, branch, email..." />
        </div>

        <div class="inbox-filter-row">
          <button class="inbox-filter active" type="button" data-filter="all">All</button>
          <button class="inbox-filter" type="button" data-filter="unread">Unread</button>
          <button class="inbox-filter" type="button" data-filter="payment">Payment</button>
          <button class="inbox-filter" type="button" data-filter="support">Support</button>
        </div>

        <div class="inbox-count-line" id="conversationCount">Loading...</div>

        <div id="conversationsList" class="conversations-list"></div>
      </aside>

      <!-- RIGHT: CHAT -->
      <main class="inbox-main">

        <!-- EMPTY STATE -->
        <div id="emptyConversation" class="empty-conversation">
          <div class="empty-orb">💬</div>
          <h2>Select a conversation</h2>
          <p>Choose a lender to start chatting.</p>
        </div>

        <!-- ACTIVE CHAT -->
        <div id="activeConversation" class="active-conversation" style="display:none;">

          <div class="chat-panel-head">
            <div>
              <h2 id="activeLenderName">Institution</h2>
              <p id="activeLenderMeta">Email • Branch</p>
            </div>

            <div class="chat-head-actions">
              <span id="activeCategoryBadge" class="category-pill">general</span>
              <button class="btn-ghost btn-sm" type="button" id="reloadThreadBtn">Reload</button>
            </div>
          </div>

          <div id="adminChatMessages" class="admin-chat-messages"></div>

          <div id="adminTyping" class="admin-typing" style="display:none;">
            <span></span><span></span><span></span>
            <em>Preparing reply...</em>
          </div>

          <div id="adminFilePreview" class="admin-file-preview" style="display:none;"></div>

          <div class="admin-reply-box">
            <div class="reply-tools">
              <select id="replyCategory">
                <option value="general">General</option>
                <option value="support">Support</option>
                <option value="payment">Payment</option>
                <option value="password">Password</option>
                <option value="meeting">Meeting</option>
                <option value="workshop">Workshop</option>
              </select>

              <button id="adminAttachBtn" type="button">📎 Attach</button>
              <input id="adminAttachment" type="file" style="display:none;" />
            </div>

            <textarea id="adminReplyInput" placeholder="Type your reply..."></textarea>

            <div class="reply-bottom">
              <div class="reply-note">🔒 Messages are locked & audited</div>
              <button class="btn-primary" id="sendAdminReplyBtn" type="button">Send</button>
            </div>
          </div>

        </div>
      </main>

    </section>

    <div class="footer">
      <div>© <span id="year"></span> LinkLedger • Botswana</div>
    </div>

  </div>

  <!-- AUTH GUARD -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    (function () {
      try {
        const token = localStorage.getItem("authToken");
        const role = String(localStorage.getItem("userRole") || localStorage.getItem("role") || "").toLowerCase();

        if (!token) {
          window.location.href = "login.html";
          return;
        }

        if (role !== "superadmin") {
          alert("Access Denied");
          window.location.href = "dashboard.html";
          return;
        }
      } catch (e) {
        window.location.href = "login.html";
      }
    })();
  </script>

 <script src="config.js"></script>
<script src="admin.js"></script>
<script src="admin_messages.js"></script>
<a id="adminFloatingInbox" href="admin_messages.html" title="Inbox">
  💬
</a>

</body>
</html>
