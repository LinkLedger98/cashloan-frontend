<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkLedger | Dashboard</title>
  <link rel="stylesheet" href="dashboard.css?v=7" />
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <h1>LinkLedger</h1>
      </div>

      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <span class="pill" id="userPill">Logged in</span>
        <a class="btn-ghost" href="welcome.html">&lt;back</a>
        <button class="btn-ghost" onclick="logout()">Logout</button>
      </div>
    </div>

   <!-- Verify customer history -->
<div class="card">
  <h2>Verify Customer</h2>
  <p>Search by National ID to see reported credit statuses across institutions.</p>

  <div class="row">
    <div>
      <label for="searchNationalId">National ID</label>
      <input id="searchNationalId" placeholder="e.g. 123456789" />
    </div>
    <div style="display:flex; align-items:flex-end;">
      <button class="btn-primary" style="width:100%;" onclick="searchClient()">Search</button>
    </div>
  </div>

  <hr />

  <div id="results" class="results"></div>
</div>

  <!-- ✅ Add Customer Record -->
<div class="card premium-section" style="margin-top:16px;">
  <button class="section-toggle" id="toggleAddClientBtn" type="button">
    <div>
      <h2>Add Customer Record</h2>
      <p class="section-sub">Add new customer credit data with consent.</p>
    </div>
    <span class="chev">⌄</span>
  </button>

  <div id="addClientWrap" class="collapse-wrap is-collapsed">

    <div style="padding: 0 18px 18px;">

      <div class="row">
        <div>
          <label for="fullName">Full name</label>
          <input id="fullName" placeholder="e.g. Thato Molefe" />
        </div>
        <div>
          <label for="nationalId">National ID</label>
          <input id="nationalId" placeholder="e.g. 123456789" />
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div>
          <label for="status">Credit Status</label>
          <select id="status">
            <option value="paid">paid</option>
            <option value="owing">owing</option>
            <option value="overdue">overdue</option>
          </select>
        </div>
        <div>
          <label for="dueDate">Due date</label>
          <input id="dueDate" type="date" />
        </div>
      </div>

      <!-- Consent -->
      <div style="margin-top:12px;">
        <label style="display:flex; gap:10px; align-items:center;">
          <input id="consentCheck" type="checkbox" />
          Customer consent obtained (required)
        </label>

        <div style="margin-top:10px;">
          <label for="consentFile">Upload signed consent proof</label>
          <input id="consentFile" type="file" />
          <div class="small" style="margin-top:6px;">
            Upload image or PDF
          </div>
        </div>
      </div>

      <div style="margin-top:14px;">
        <button class="btn-primary" onclick="addClient()">Save record</button>
      </div>

    </div>

  </div>
</div>

 <!-- ✅ My Customers -->
<div class="card premium-section" style="margin-top:16px;">
  <button class="section-toggle" id="toggleMyClientsBtn" type="button">
    <div>
      <h2>My Customers</h2>
      <p class="section-sub">View and manage your saved customer records.</p>
    </div>
    <span class="chev">⌄</span>
  </button>

  <div id="myClientsWrap" class="collapse-wrap is-collapsed">
    <div class="section-tools">
      <input id="myClientsSearch" placeholder="Search name or National ID" />
      <button class="btn-ghost" onclick="loadMyClients()">Refresh</button>
    </div>

    <div id="myClientsList" class="results"></div>
  </div>
</div>

<!-- ✅ My Disputes -->
<div class="card premium-section" style="margin-top:16px;">
  <button class="section-toggle" id="toggleMyDisputesBtn" type="button">
    <div>
      <h2>My Disputes</h2>
      <p class="section-sub">Track active and recently closed dispute records.</p>
    </div>
    <span class="chev">⌄</span>
  </button>

  <div id="myDisputesWrap" class="collapse-wrap is-collapsed">
    <div class="section-tools">
      <button class="btn-ghost" id="reloadMyDisputesBtn" type="button">Refresh</button>
    </div>

    <h3>Active Disputes</h3>
    <div id="myDisputesActive" class="results"></div>

    <div style="margin-top:16px;">
      <h3>Closed Disputes</h3>
      <div id="myDisputesClosed" class="results"></div>
    </div>
  </div>
</div>

  <script src="config.js?v=7"></script>
  <script src="dashboard.js?v=7"></script>
</body>
</html>
