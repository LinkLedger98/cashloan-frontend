<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin • Accounts | LinkLedger</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="admin_messages.css" />
</head>

<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <h1>LinkLedger • Super Admin</h1>
      </div>

      <div class="legacy-badge" title="Legacy Mode">
        <span class="legacy-dot legacy-dot-pink"></span>
        <span class="legacy-lt">&lt;</span>
        <span class="legacy-dot legacy-dot-blue"></span>
        <span class="legacy-text">Legacy Mode</span>
      </div>

      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <span class="pill" id="adminPill">Logged in</span>
        <a class="btn-ghost" href="welcome.html">Home</a>
        <button class="btn-ghost" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="adminNav" style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn-primary btn-sm" href="admin_accounts.html">Accounts</a>
      <a class="btn-ghost btn-sm" href="admin_disputes.html">Disputes</a>
      <a class="btn-ghost btn-sm" href="admin_consents.html">Consents</a>
      <a class="btn-ghost btn-sm" href="admin_audit.html">Audit</a>
    </div>

    <!-- Stats -->
    <div class="admin-stats-grid" style="margin-top:16px;">
      <div class="admin-stat-card">
        <div class="stat-label">Institutions</div>
        <div class="stat-value" id="statInstitutions">—</div>
      </div>

      <div class="admin-stat-card">
        <div class="stat-label">Signup Requests</div>
        <div class="stat-value" id="statRequests">—</div>
      </div>

      <div class="admin-stat-card">
        <div class="stat-label">Pending Payments</div>
        <div class="stat-value" id="statPendingPayments">—</div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">

      <!-- Create Institution -->
      <div style="display:flex; justify-content:space-between; align-items:flex-end; gap:10px; flex-wrap:wrap;">
        <div>
          <h2>Create Institution Account</h2>
          <p class="small" style="margin:6px 0 0 0;">
            Use Admin Token (recommended) or ADMIN_KEY (legacy fallback).
          </p>
        </div>

        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn-ghost btn-sm" id="fillFormBtn" type="button">Fill Form</button>
          <button class="btn-ghost btn-sm" id="clearFormBtn" type="button">Clear</button>
        </div>
      </div>

      <form id="adminForm" style="margin-top:12px;">
        <label>ADMIN KEY (optional)</label>
        <input id="adminKey" autocomplete="off" />

        <div class="row">
          <div>
            <label>Business Name</label>
            <input id="businessName" required />
          </div>
          <div>
            <label>Branch</label>
            <input id="branchName" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Phone</label>
            <input id="phone" required />
          </div>
          <div>
            <label>NBIFIRA License No.</label>
            <input id="licenseNo" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Email</label>
            <input id="email" type="email" required />
          </div>
          <div>
            <label>Temporary Password</label>
            <input id="tempPassword" required />
          </div>
        </div>

        <button class="btn-primary" type="submit">Create Institution</button>
        <p id="msg" class="small" style="margin-top:10px;"></p>
      </form>

      <!-- Requests -->
      <div style="margin-top:18px;">
        <h2>Signup Requests</h2>
        <button class="btn-ghost btn-sm" id="reloadRequestsBtn">Reload</button>
        <div id="requestsList" style="margin-top:10px;"></div>
      </div>

      <!-- Institutions -->
      <div style="margin-top:18px;">
        <h2>Institutions</h2>

        <div class="row">
          <div>
            <input id="lendersSearch" placeholder="Search..." />
          </div>
          <div>
            <button class="btn-ghost btn-sm" id="reloadLendersBtn">Reload</button>
          </div>
        </div>

        <div id="lendersList" style="margin-top:10px;"></div>
      </div>

    </div>

    <div class="footer">
      <div>© <span id="year"></span> LinkLedger • Botswana</div>
    </div>

  </div>

  <!-- FLOATING INBOX -->
  <a id="adminFloatingInbox" href="admin_messages.html" title="Admin Inbox">
    💬
  </a>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    (function () {
      try {
        const token = localStorage.getItem("authToken");
        const role = String(
          localStorage.getItem("userRole") || localStorage.getItem("role") || ""
        ).toLowerCase();

        if (!token) {
          window.location.href = "login.html";
          return;
        }

        if (role !== "superadmin") {
          window.location.href = "dashboard.html";
          return;
        }
      } catch (e) {
        window.location.href = "login.html";
      }
    })();
  </script>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
